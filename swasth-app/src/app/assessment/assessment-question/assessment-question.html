<div class="page">

  <!-- Header -->
  <div class="header">
    <button class="logo-btn" (click)="goHome()">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21C12 21 3 13.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.91 3.81 13 5.08C14.09 3.81 15.76 3 17.5 3C20.58 3 23 5.42 23 8.5C23 13.5 12 21 12 21Z" fill="white" fill-opacity="0.9"/>
        <path d="M9 10.5H11V8.5H13V10.5H15V12.5H13V14.5H11V12.5H9V10.5Z" fill="#1d4ed8"/>
      </svg>
      <span class="logo-text">Swasth</span>
    </button>
    <div class="header-actions">
      <button class="btn-ghost" (click)="goHome()">Home</button>
      <button class="btn-ghost" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="question-container">

    <!-- Progress bar -->
    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progressPercent"></div>
      </div>
      <span class="progress-text">Question {{ questionsAsked }} of {{ maxQuestions }}</span>
    </div>

    <!-- Loading state -->
    <div class="loading" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Analysing your answer...</p>
    </div>

    <!-- Question card -->
    <div class="question-card" *ngIf="!isLoading">

      <div class="question-icon">🩺</div>
      <h2 class="question-text">{{ question }}</h2>

      <div class="options">
        <button
          *ngFor="let option of options"
          class="option-btn"
          [ngClass]="{
            'option-yes':     option === 'Yes',
            'option-no':      option === 'No',
            'option-notsure': option === 'Not sure'
          }"
          (click)="answer(option)"
        >
          {{ option }}
        </button>
      </div>

    </div>

    <!-- Error -->
    <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

    <!-- Confirmed symptoms -->
    <div class="confirmed-summary" *ngIf="confirmedSymptoms.length > 0">
      <p class="summary-label">Confirmed so far:</p>
      <div class="summary-chips">
        <span class="summary-chip" *ngFor="let sym of confirmedSymptoms">
          {{ formatSymptom(sym) }}
        </span>
      </div>
    </div>

  </div>
</div>
