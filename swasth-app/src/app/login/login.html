<div class="page-wrapper">
  <div class="auth-card">
    <!-- LEFT: Form -->
    <div class="form-side">
      <a class="brand" routerLink="/">
        <img src="assets/logo_icon.png" alt="Swasth Logo" />
        Swasth
      </a>

      <div class="form-box">
        <h1>Welcome Back!</h1>
        <p class="subtitle">Sign in to continue to Swasth</p>

        <div *ngIf="errorMessage" class="error-banner">
          {{ errorMessage }}
        </div>

        <div class="field-group">
          <label> <span class="label-icon">✉</span> Email </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect
                  x="2"
                  y="5"
                  width="16"
                  height="11"
                  rx="2"
                  stroke="#9ab0cc"
                  stroke-width="1.5"
                />
                <path d="M2 7l8 5 8-5" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </span>
            <input
              type="email"
              placeholder="Email"
              [(ngModel)]="email"
              name="email"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field-group">
          <label>
            <span class="label-icon">
              <svg
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                width="15"
                height="15"
              >
                <circle cx="10" cy="8" r="3.5" stroke="#1a56db" stroke-width="1.5" />
                <path
                  d="M4 18c0-3.314 2.686-6 6-6s6 2.686 6 6"
                  stroke="#1a56db"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            Password
            <a class="forgot-link" href="#">Forgot Password?</a>
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect
                  x="4"
                  y="9"
                  width="12"
                  height="9"
                  rx="2"
                  stroke="#9ab0cc"
                  stroke-width="1.5"
                />
                <path
                  d="M7 9V6a3 3 0 016 0v3"
                  stroke="#9ab0cc"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Password"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
            />
            <button class="toggle-pw" type="button" (click)="togglePassword()">
              <svg
                *ngIf="!showPassword"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"
                  stroke="#9ab0cc"
                  stroke-width="1.5"
                />
                <circle cx="10" cy="10" r="2.5" stroke="#9ab0cc" stroke-width="1.5" />
              </svg>
              <svg
                *ngIf="showPassword"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M3 3l14 14M8.5 8.6A2.5 2.5 0 0011.4 11.5M6.2 6.3C4.2 7.4 2.5 9.3 1 10c1.5.7 4.5 5 9 5a8.6 8.6 0 004.8-1.5M10 5c4 0 7.5 4.3 9 5-.6.3-1.3.8-2.2 1.3"
                  stroke="#9ab0cc"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" (click)="onLogin()">Login</button>

        <p class="switch-link">
          Don't have an account?
          <a (click)="goToRegister()">Register</a>
        </p>
      </div>
    </div>

    <!-- RIGHT: Hero Image -->
    <div class="image-side">
      <img src="assets/hero_mobile_doctor.png" alt="Swasth AI Doctor" class="hero-img" />
    </div>
  </div>

  <footer class="footer">© 2026 Swasth Healthcare Chatbot | All Rights Reserved</footer>
</div>
