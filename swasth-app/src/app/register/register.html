<div class="page-wrapper">
  <div class="auth-card">

    <!-- LEFT: Form -->
    <div class="form-side">
      <a class="brand" routerLink="/">
        <img src="assets/logo_icon.png" alt="Swasth Logo" width="32" height="32" />
        Swasth
      </a>

      <div class="form-box">
        <h1>Create an Account</h1>
        <p class="subtitle">Sign up to Swasth to get started</p>

        <div *ngIf="errorMessage" class="error-banner">
          {{ errorMessage }}
        </div>

        <!-- Full Name -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <circle cx="10" cy="7" r="3.5" stroke="#1a56db" stroke-width="1.5"/>
              <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Full Name
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10" cy="7" r="3.5" stroke="#9ab0cc" stroke-width="1.5"/>
                <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="text" placeholder="Enter your full name" [(ngModel)]="fullName" name="fullName" autocomplete="name" />
          </div>
        </div>

        <!-- Age -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <circle cx="10" cy="10" r="7.5" stroke="#1a56db" stroke-width="1.5"/>
              <path d="M10 6v4l2.5 2.5" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Age
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10" cy="10" r="7.5" stroke="#9ab0cc" stroke-width="1.5"/>
                <path d="M10 6v4l2.5 2.5" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="number" placeholder="Enter your age" [(ngModel)]="age" name="age" min="1" max="120" />
          </div>
        </div>

        <!-- Gender -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <circle cx="10" cy="7" r="3.5" stroke="#1a56db" stroke-width="1.5"/>
              <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Gender
          </label>
          <div class="gender-options">
            <label class="radio-option">
              <input type="radio" name="gender" value="Male" [(ngModel)]="gender" />
              <span class="radio-custom"></span>
              Male
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="Female" [(ngModel)]="gender" />
              <span class="radio-custom"></span>
              Female
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="Other" [(ngModel)]="gender" />
              <span class="radio-custom"></span>
              Other
            </label>
          </div>
        </div>

        <!-- Address -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <path d="M10 2C7.239 2 5 4.239 5 7c0 4 5 11 5 11s5-7 5-11c0-2.761-2.239-5-5-5z" stroke="#1a56db" stroke-width="1.5"/>
              <circle cx="10" cy="7" r="1.5" stroke="#1a56db" stroke-width="1.5"/>
            </svg>
            Address
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 2C7.239 2 5 4.239 5 7c0 4 5 11 5 11s5-7 5-11c0-2.761-2.239-5-5-5z" stroke="#9ab0cc" stroke-width="1.5"/>
                <circle cx="10" cy="7" r="1.5" stroke="#9ab0cc" stroke-width="1.5"/>
              </svg>
            </span>
            <input type="text" placeholder="Enter your address" [(ngModel)]="address" name="address" autocomplete="street-address" />
          </div>
        </div>

        <!-- Email -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <rect x="2" y="5" width="16" height="11" rx="2" stroke="#1a56db" stroke-width="1.5"/>
              <path d="M2 7l8 5 8-5" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Email Address
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="5" width="16" height="11" rx="2" stroke="#9ab0cc" stroke-width="1.5"/>
                <path d="M2 7l8 5 8-5" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="email" placeholder="Enter your email" [(ngModel)]="email" name="email" autocomplete="email" />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <rect x="4" y="9" width="12" height="9" rx="2" stroke="#1a56db" stroke-width="1.5"/>
              <path d="M7 9V6a3 3 0 016 0v3" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Password
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="#9ab0cc" stroke-width="1.5"/>
                <path d="M7 9V6a3 3 0 016 0v3" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input [type]="showPassword ? 'text' : 'password'" placeholder="Create a password" [(ngModel)]="password" name="password" autocomplete="new-password" />
            <button class="toggle-pw" type="button" (click)="togglePassword()">
              <svg *ngIf="!showPassword" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z" stroke="#9ab0cc" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="#9ab0cc" stroke-width="1.5"/>
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3l14 14M8.5 8.6A2.5 2.5 0 0011.4 11.5M6.2 6.3C4.2 7.4 2.5 9.3 1 10c1.5.7 4.5 5 9 5a8.6 8.6 0 004.8-1.5M10 5c4 0 7.5 4.3 9 5-.6.3-1.3.8-2.2 1.3" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15">
              <rect x="4" y="9" width="12" height="9" rx="2" stroke="#1a56db" stroke-width="1.5"/>
              <path d="M7 9V6a3 3 0 016 0v3" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Confirm Password
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="#9ab0cc" stroke-width="1.5"/>
                <path d="M7 9V6a3 3 0 016 0v3" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Re-enter your password" [(ngModel)]="confirmPassword" name="confirmPassword" autocomplete="new-password" />
            <button class="toggle-pw" type="button" (click)="toggleConfirmPassword()">
              <svg *ngIf="!showConfirmPassword" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z" stroke="#9ab0cc" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="#9ab0cc" stroke-width="1.5"/>
              </svg>
              <svg *ngIf="showConfirmPassword" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3l14 14M8.5 8.6A2.5 2.5 0 0011.4 11.5M6.2 6.3C4.2 7.4 2.5 9.3 1 10c1.5.7 4.5 5 9 5a8.6 8.6 0 004.8-1.5M10 5c4 0 7.5 4.3 9 5-.6.3-1.3.8-2.2 1.3" stroke="#9ab0cc" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" (click)="onRegister()">Register</button>

        <p class="switch-link">
          Already have an account?
          <a (click)="goToLogin()">Login</a>
        </p>
      </div>
    </div>

    <!-- RIGHT: Hero Image -->
    <div class="image-side">
      <img src="assets/hero_mobile_doctor.png" alt="Swasth AI Doctor" class="hero-img" />
    </div>

  </div>

  <footer class="footer">
    © 2026 Swasth Healthcare Chatbot | All Rights Reserved
  </footer>
</div>
